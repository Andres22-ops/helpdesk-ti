{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-plus-circle text-primary"></i> Nuevo ticket</h5>
            <form method="POST" action="/tickets/crear">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Título del problema</label>
                    <input type="text" name="titulo" class="form-control" placeholder="Ej: No funciona el correo corporativo" required maxlength="100">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Descripción detallada</label>
                    <textarea name="descripcion" class="form-control" rows="4" placeholder="Describe el problema con el mayor detalle posible..." required></textarea>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Categoría</label>
                        <select name="id_cat" class="form-select" required>
                            <option value="">Selecciona una categoría</option>
                            {% for c in categorias %}
                            <option value="{{ c.id_cat }}">{{ c.nombre_cat }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-semibold">Prioridad</label>
                        <select name="id_prio" class="form-select" required>
                            <option value="">Selecciona la prioridad</option>
                            {% for p in prioridades %}
                            <option value="{{ p.id_prio }}">{{ p.nivel_prio }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="d-flex gap-2 mt-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-send"></i> Crear ticket
                    </button>
                    <a href="/tickets/" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
