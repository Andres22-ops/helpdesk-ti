{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4">
            <h5 class="fw-bold mb-4"><i class="bi bi-person-plus text-primary"></i> Crear usuario</h5>
            <form method="POST" action="/admin/usuarios/crear">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Nombre completo</label>
                    <input type="text" name="nombre" class="form-control" required maxlength="100">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Correo electrónico</label>
                    <input type="email" name="correo" class="form-control" required maxlength="100">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Contraseña</label>
                    <input type="password" name="password" class="form-control" required minlength="6">
                    <div class="form-text">Mínimo 6 caracteres. Se guardará cifrada con bcrypt.</div>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-semibold">Rol</label>
                    <select name="rol" class="form-select" required>
                        <option value="Cliente">Cliente</option>
                        <option value="Agente">Agente</option>
                        <option value="Admin">Admin</option>
                    </select>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Crear usuario
                    </button>
                    <a href="/admin/usuarios" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
